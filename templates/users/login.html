{% extends 'base.html' %}
{% block title %}Login — Campus Food{% endblock %}

{% block extra_js %}
<script>
const loginFormStorageKey = 'campusFoodLoginFormState'

function getLoginForm() {
    return document.querySelector('form')
}

function getLoginUsernameInput() {
    return document.querySelector('input[name="username"]')
}

function persistLoginFormState() {
    const usernameInput = getLoginUsernameInput()
    const payload = {
        username: usernameInput ? usernameInput.value.trim() : '',
    }

    try {
        window.sessionStorage.setItem(loginFormStorageKey, JSON.stringify(payload))
    } catch (error) {
        console.warn('Could not persist login form state.', error)
    }
}

function restoreLoginFormState() {
    try {
        const raw = window.sessionStorage.getItem(loginFormStorageKey)
        if (!raw) {
            return
        }

        const data = JSON.parse(raw)
        const usernameInput = getLoginUsernameInput()
        if (usernameInput && !usernameInput.value && data.username) {
            usernameInput.value = data.username
        }
    } catch (error) {
        console.warn('Could not restore login form state.', error)
    }
}

window.addEventListener('load', () => {
    const form = getLoginForm()
    const usernameInput = getLoginUsernameInput()

    restoreLoginFormState()

    if (usernameInput) {
        usernameInput.addEventListener('input', persistLoginFormState)
    }

    if (form) {
        form.addEventListener('submit', persistLoginFormState)
    }
})
</script>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 mt-5">
            <h3 class="text-center mb-4">Welcome Back 👋</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>

            </form>
            <div class="text-center mt-2">
    <a href="{% url 'password_reset' %}" class="text-muted small">
        Forgot your password?
    </a>
</div>
            <hr>
            <p class="text-center mb-0">
                New student? <a href="{% url 'register' %}">Register here</a>
            </p>
            <p class="text-center mb-0 mt-2">
                Vendor or Delivery? <a href="{% url 'apply' %}">Apply here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
